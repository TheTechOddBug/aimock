name: Fix Drift
on:
  workflow_dispatch:
  # C3: the deprecation detector fires on its OWN schedule, independent of the
  # drift-failure gate below — a model family vanishing from a live `/models`
  # listing does not, by itself, red the Drift Tests workflow (a vanished
  # family simply stops appearing in `live`), so it would never auto-fire under
  # the workflow_run gate alone.
  schedule:
    - cron: "10 6 * * *" # Daily 6:10am UTC (offset from test-drift.yml's 6:00am)
  workflow_run:
    workflows: ["Drift Tests"]
    types: [completed]
    branches: [main]

concurrency:
  group: drift-fix
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # C3: this job used to run an autonomous coding-agent subprocess to rewrite
  # WHATEVER drift the collector found however it saw fit, then gate the
  # resulting diff behind a large anti-cheat verdict function before opening a
  # PR. Both the agent invocation and the verdict-gating module have been
  # DELETED entirely — see `self-healing-drift-plan.md` /
  # `drift-auto-adjust-architecture-spec.md`: general (non-model-churn) drift
  # is no longer auto-fixed by anything. It is caught by the daily
  # `Drift Tests` workflow (which alerts on its own) and left for a human to
  # fix normally; the automation boundary that remains is exactly the
  # DETERMINISTIC, zero-agent model-family sync below (`drift-sync.ts` /
  # `drift-sync-check.ts`), which only ever performs a mechanical, data-only
  # edit to `model-registry.ts` or drops a needs-human dedup note file — never
  # arbitrary code generation — so there is no adversarial diff left to police.
  sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: "1108748"
          private-key: ${{ secrets.DEVOPS_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Clone ag-ui: drift-sync-check.ts's "clean re-collect" gate (gate 3, see
      # drift-sync-check.ts) shells out the FULL drift-report-collector, which
      # includes the AG-UI schema drift leg — that leg reads this checkout.
      - name: Clone ag-ui repo
        run: git clone --depth 1 https://github.com/ag-ui-protocol/ag-ui.git ../ag-ui

      # Configure git identity and create a fix branch. drift-sync.ts commits
      # its own mechanical edit (or needs-human note file) directly onto this
      # branch; this step only prepares the branch to commit onto.
      - name: Configure git
        id: gitcfg
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "aimock-drift-bot"
          git config user.email "drift-bot@copilotkit.ai"
          # Record the pre-sync HEAD (the commit the workflow ran on) BEFORE the
          # fix branch is created. drift-sync.ts commits its own edit/note onto
          # this branch; the needs-human persist step below compares HEAD against
          # this base to tell a real new note (a commit to push) from a re-fire
          # of an already-persisted note (nothing to push).
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git checkout -B "fix/drift-$(date +%Y-%m-%d)-${RUN_ID}"

      # Provision a local Ollama daemon so drift-sync-check's clean-re-collect
      # gate (which shells out the FULL collector, exercising every live leg)
      # behaves identically to test-drift.yml's own daily run rather than
      # spuriously quarantining/erroring on the Ollama leg for a missing daemon.
      - name: Provision Ollama daemon (drift-sync-check re-collect gate)
        run: |
          set -euo pipefail
          curl -fsSL https://ollama.com/install.sh -o "${RUNNER_TEMP}/ollama-install.sh"
          sh "${RUNNER_TEMP}/ollama-install.sh"
          ollama serve > /tmp/ollama-serve.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:11434/api/version >/dev/null 2>&1; then
              echo "ollama daemon ready"; break
            fi
            sleep 1
          done
          ollama pull qwen2:0.5b

      # Step 1: run the deterministic (zero-LLM) model-family sync.
      #
      # drift-sync.ts fetches each provider's live `/models` listing directly
      # (no drift-report.json input needed), diffs it against the frozen
      # `model-registry.ts` classification, and:
      #   - a zero-reference deprecated family -> mechanical, comment-marked
      #     removal, gated behind drift-sync-check.ts (allowlist + checksum-pin
      #     re-assert + clean re-collect) BEFORE the edit is kept, then commits.
      #   - a still-referenced deprecation, or a genuinely new/unclassified
      #     family -> NEVER auto-edited; drops a family-keyed dedup note file
      #     under drift-proposals/ and reports needs-human (job fails RED below
      #     so a human sees it — no PR spam on re-fire, since the note already
      #     exists on subsequent runs).
      # No autonomous coding agent, no subprocess spawn, no free-form code
      # generation anywhere in this path (see drift-sync.ts module doc).
      - name: Run deterministic drift sync
        id: sync
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # The drift-sync-check re-collect gate exercises every live leg
          # (including Ollama), so it needs the same env as the daily run.
          OLLAMA_HOST: 127.0.0.1:11434
          OLLAMA_MODEL: qwen2:0.5b
          FAL_KEY: ${{ secrets.FAL_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          SYNC_LOG: ${{ runner.temp }}/drift-sync.log
        run: |
          set +e
          npx tsx scripts/drift-sync.ts 2>&1 | tee "${SYNC_LOG}"
          SYNC_EXIT=${PIPESTATUS[0]}
          set -e
          REASON="$(grep '^reason=' "${SYNC_LOG}" | tail -n1)"
          REASON="${REASON#reason=}"
          # Stable, date-independent identity of this run's changeset (the sorted
          # set of applied + deferred family outcomes, hashed — see
          # computeChangesetKey in drift-sync.ts). BOTH PR-open paths dedup on
          # this so a daily re-fire of the same drift never opens a second PR,
          # in EVERY run shape — including the mixed run that commits a registry
          # edit but NO new note file (where a note-path-only key is empty).
          CHANGESET_KEY="$(grep '^changeset-key=' "${SYNC_LOG}" | tail -n1)"
          CHANGESET_KEY="${CHANGESET_KEY#changeset-key=}"
          {
            echo "exit_code=${SYNC_EXIT}"
            echo "reason=${REASON}"
            echo "changeset_key=${CHANGESET_KEY}"
          } >> "$GITHUB_OUTPUT"
          echo "drift-sync exited ${SYNC_EXIT} (reason=${REASON}, changeset_key=${CHANGESET_KEY})"

      - name: Upload drift-sync log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: drift-sync-log
          path: ${{ runner.temp }}/drift-sync.log
          if-no-files-found: warn
          retention-days: 30

      # Step 2: defense-in-depth re-assertion of drift-sync-check.ts against the
      # now-committed state, ONLY when the sync actually applied a mechanical
      # edit (reason=ok-applied). drift-sync.ts already gates its OWN edit
      # behind this exact check before committing (reverting on failure), so
      # this step re-verifies the committed result the same way the old
      # workflow re-asserted its (then-agent-authored) diff via a verdict
      # function before opening a PR — mirrored here with the trivial,
      # deterministic replacement instead.
      - name: Assert drift-sync-check (defense-in-depth)
        id: assert
        if: steps.sync.outputs.reason == 'ok-applied'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OLLAMA_HOST: 127.0.0.1:11434
          OLLAMA_MODEL: qwen2:0.5b
          FAL_KEY: ${{ secrets.FAL_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ASSERT_LOG: ${{ runner.temp }}/drift-sync-check.log
        run: |
          set +e
          npx tsx scripts/drift-sync-check.ts 2>&1 | tee "${ASSERT_LOG}"
          ASSERT_EXIT=${PIPESTATUS[0]}
          set -e
          REASON="$(grep '^reason=' "${ASSERT_LOG}" | tail -n1)"
          REASON="${REASON#reason=}"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          if [ "$ASSERT_EXIT" -ne 0 ]; then
            echo "::error::drift-sync-check refused (exit ${ASSERT_EXIT}, reason=${REASON}) — not opening a PR"
            exit "$ASSERT_EXIT"
          fi
          echo "drift-sync-check: sync verified data-only, pins intact, clean re-collect"

      - name: Upload drift-sync-check log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: drift-sync-check-log
          path: ${{ runner.temp }}/drift-sync-check.log
          if-no-files-found: warn
          retention-days: 30

      # Inject git credentials only when needed for push (persist-credentials:
      # false above). BOTH push paths need it: the ok-applied mechanical-edit PR
      # AND the needs-human note-persist PR below.
      - name: Configure git for push
        if: >-
          success() &&
          (steps.sync.outputs.reason == 'ok-applied' ||
           steps.sync.outputs.reason == 'needs-human')
        run: git config --local url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}

      # Step 3: push the branch drift-sync committed onto and open a data-only
      # PR. Select the PR by HEAD-SHA match so a stale/unrelated open PR on the
      # same head branch is never mistaken for the one just pushed.
      - name: Push branch + create PR
        id: pr
        if: steps.sync.outputs.reason == 'ok-applied' && success()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CHANGESET_KEY: ${{ steps.sync.outputs.changeset_key }}
        run: |
          set -euo pipefail
          # De-dup (idempotent across daily re-fires): the mechanical edit is
          # never auto-merged, so an un-merged drift is re-detected every cron
          # run and would otherwise open a brand-new PR each day. Skip when an
          # open PR already carries this run's stable changeset marker (keyed on
          # the date-independent changeset key, NOT the date-stamped branch name
          # or diff bytes). An applied edit deserves exactly ONE open PR,
          # re-findable across runs.
          if [ -n "${CHANGESET_KEY:-}" ]; then
            OPEN_PRS="$(gh pr list --state open --json number,body 2>/dev/null || echo '[]')"
            DUP="$(printf '%s' "$OPEN_PRS" | jq -r --arg m "drift-changeset: ${CHANGESET_KEY}" \
              'map(select(.body | contains($m))) | .[0].number // empty')"
            if [ -n "$DUP" ]; then
              echo "ok-applied: changeset ${CHANGESET_KEY} already proposed in open PR #${DUP} — not opening a duplicate"
              exit 0
            fi
          fi
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          git push -u origin "$BRANCH"
          HEAD_SHA="$(git rev-parse HEAD)"
          echo "Pushed branch ${BRANCH} at ${HEAD_SHA}"

          PR_BODY_FILE="${RUNNER_TEMP}/drift-sync-pr-body.md"
          {
            echo "## Summary"
            echo ""
            echo "Auto-generated, DATA-ONLY model-family sync (zero-LLM)."
            echo ""
            # Stable changeset marker — the dedup guard above matches open PRs on
            # this so a daily re-fire of the same drift never opens a second PR.
            echo "<!-- drift-changeset: ${CHANGESET_KEY} -->"
            echo ""
            echo "> **Needs human review + merge.** This PR was opened by the"
            echo "> deterministic drift-sync pipeline after \`drift-sync-check\`"
            echo "> passed (changed-file allowlist, checksum-pin re-assert, clean"
            echo "> re-collect). It is NOT auto-merged — review CI, the diff, and"
            echo "> merge."
            echo ""
            echo "### drift-sync-check verdict"
            echo ""
            echo '```'
            cat "${RUNNER_TEMP}/drift-sync-check.log" 2>/dev/null || echo "(see drift-sync-log / drift-sync-check-log artifacts)"
            echo '```'
            echo ""
            echo "### drift-sync outcome"
            echo ""
            echo '```'
            cat "${RUNNER_TEMP}/drift-sync.log" 2>/dev/null || echo "(see drift-sync-log artifact)"
            echo '```'
          } > "$PR_BODY_FILE"

          gh pr create \
            --title "fix(drift-sync): mechanical model-family sync ($(date +%Y-%m-%d))" \
            --assignee jpr5 \
            --body-file "$PR_BODY_FILE"

          PR_URL=""
          PR_NUMBER=""
          for attempt in $(seq 1 6); do
            MATCH="$(gh pr list --state open --json url,number,headRefOid \
              --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | {url, number}" 2>/dev/null || true)"
            if [ -n "$MATCH" ]; then
              PR_URL="$(printf '%s' "$MATCH" | jq -r '.url')"
              PR_NUMBER="$(printf '%s' "$MATCH" | jq -r '.number')"
              break
            fi
            echo "PR for head SHA not indexed yet (attempt $attempt/6), waiting 10s..."
            sleep 10
          done
          if [ -z "$PR_URL" ]; then
            echo "::error::No open PR found whose head matches pushed SHA $HEAD_SHA"
            exit 1
          fi
          echo "Matched PR #$PR_NUMBER: $PR_URL"
          {
            echo "url=$PR_URL"
            echo "number=$PR_NUMBER"
            echo "head_sha=$HEAD_SHA"
          } >> "$GITHUB_OUTPUT"

      # G#2: PERSIST the needs-human note (the Bucket-B human touchpoint).
      # drift-sync.ts has ALREADY committed the note file(s) (and, in a mixed
      # run, its already-gated mechanical registry edit) onto the fix branch via
      # commitSyncChanges — but that commit lives only in the runner's working
      # tree. The ok-applied "Push branch + create PR" step above fires ONLY on
      # reason == 'ok-applied', so on a needs-human run nothing was pushed and
      # the note was DISCARDED with the runner: the human had no note to review,
      # and the two-run "Decision: include -> next run applies" protocol could
      # never trigger (the next run finds no persisted note). This step closes
      # that gap: it pushes a DISTINCT branch and opens a needs-human PR so the
      # note lands in the repo. NO AUTO-MERGE — a human sets `Decision: include`
      # (or closes to reject) and merges; the next drift-sync run reads the
      # approved note from main and applies the mechanical edit.
      #
      # Re-fire discipline (no PR spam): three layers, idempotent in EVERY run
      # shape. (1) If this run produced NO new commit (drift-sync.ts's
      # ensureProposalNote already deduped the note against main), there is
      # nothing to push. (2) PRIMARY: if an open PR already carries this run's
      # stable, date-independent CHANGESET KEY marker, skip — this covers the
      # MIXED run whose committed diff is a registry edit with NO new note file
      # (where the per-note check below is empty and would otherwise fall
      # through to an unconditional push + PR every daily cron run). (3)
      # SECONDARY: if an open PR already proposes one of this run's note files
      # (matched by the per-note body marker), skip. The Slack alert below still
      # fires either way.
      - name: Persist needs-human note + open PR
        id: needs_human_pr
        if: steps.sync.outputs.reason == 'needs-human' && success()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_SHA: ${{ steps.gitcfg.outputs.base_sha }}
          RUN_ID: ${{ github.run_id }}
          CHANGESET_KEY: ${{ steps.sync.outputs.changeset_key }}
        run: |
          set -euo pipefail
          HEAD_SHA="$(git rev-parse HEAD)"
          # Re-fire of an already-persisted note: no new commit -> already reachable.
          if [ "$HEAD_SHA" = "$BASE_SHA" ]; then
            echo "needs-human: no new commit (note already persisted in the repo) — nothing to push"
            exit 0
          fi

          OPEN_PRS="$(gh pr list --state open --json number,body 2>/dev/null || echo '[]')"

          # PRIMARY de-dup (idempotent across daily re-fires in EVERY shape,
          # INCLUDING the mixed run whose committed diff is a registry edit with
          # NO new drift-proposals/* note). Keyed on the stable, date-independent
          # changeset key — which is non-empty here even when no note file is in
          # the diff, so this guard fires where the per-note loop below cannot.
          # Without it, a mixed run re-detects the same un-merged registry edit
          # every daily cron run and opens a brand-new near-identical PR each
          # time (unbounded PR-spam). Matched by the "drift-changeset: <key>"
          # body marker this step writes below.
          if [ -n "${CHANGESET_KEY:-}" ]; then
            DUP="$(printf '%s' "$OPEN_PRS" | jq -r --arg m "drift-changeset: ${CHANGESET_KEY}" \
              'map(select(.body | contains($m))) | .[0].number // empty')"
            if [ -n "$DUP" ]; then
              echo "needs-human: changeset ${CHANGESET_KEY} already proposed in open PR #${DUP} — not opening a duplicate"
              exit 0
            fi
          fi

          # The note file(s) drift-sync.ts committed this run.
          mapfile -t COMMITTED < <(git diff --name-only "$BASE_SHA" HEAD)
          NOTES=()
          for f in "${COMMITTED[@]}"; do
            case "$f" in drift-proposals/*) NOTES+=("$f") ;; esac
          done

          # SECONDARY de-dup (retained): never open a SECOND PR for a note a
          # still-open PR already proposes (matched by the per-note
          # "drift-proposal-note: <path>" body marker this step writes below).
          for note in "${NOTES[@]:-}"; do
            [ -n "$note" ] || continue
            DUP="$(printf '%s' "$OPEN_PRS" | jq -r --arg m "drift-proposal-note: ${note}" \
              'map(select(.body | contains($m))) | .[0].number // empty')"
            if [ -n "$DUP" ]; then
              echo "needs-human: note ${note} already proposed in open PR #${DUP} — not opening a duplicate"
              exit 0
            fi
          done

          # Distinct branch (never collides with the ok-applied fix/drift-* branch).
          BRANCH="drift-needs-human/$(date +%Y-%m-%d)-${RUN_ID}"
          git checkout -B "$BRANCH"
          git push -u origin "$BRANCH"
          echo "Pushed needs-human branch ${BRANCH} at ${HEAD_SHA}"

          PR_BODY_FILE="${RUNNER_TEMP}/drift-needs-human-pr-body.md"
          {
            echo "## Needs a human decision (drift-sync)"
            echo ""
            echo "The deterministic, zero-LLM drift-sync found a model-family change it must"
            echo "NOT auto-apply (a genuinely new/unclassified family, a still-referenced"
            echo "deprecation, or a registry structural mismatch). It wrote the note file(s)"
            echo "below and opened this PR so the decision is REACHABLE in the repo."
            echo ""
            echo "> **Not auto-merged — a human decides.** For a *new-family* note: set the"
            echo "> note's decision line to \`Decision: include\` (to classify it) or delete the"
            echo "> note / close this PR (to reject), then **merge this PR**. The NEXT drift-sync"
            echo "> run reads the approved note from \`main\` and mechanically applies the registry"
            echo "> edit (still zero-LLM — a human-authored marker, not generated code), opening a"
            echo "> separate data-only PR. That two-run hand-off is how the loop closes."
            echo ""
            echo "### Note file(s) in this PR"
            echo ""
            # PRIMARY dedup marker — the changeset-key guard above matches open
            # PRs on this, so a daily re-fire of the same drift (in ANY shape,
            # including a mixed run that carries no NEW note file) never opens a
            # second PR.
            echo "<!-- drift-changeset: ${CHANGESET_KEY} -->"
            for note in "${NOTES[@]:-}"; do
              [ -n "$note" ] || continue
              echo "- \`${note}\`"
              echo "<!-- drift-proposal-note: ${note} -->"
            done
            echo ""
            echo "### drift-sync outcome"
            echo ""
            echo '```'
            cat "${RUNNER_TEMP}/drift-sync.log" 2>/dev/null || echo "(see drift-sync-log artifact)"
            echo '```'
          } > "$PR_BODY_FILE"

          gh pr create \
            --title "chore(drift-sync): needs-human model-family decision ($(date +%Y-%m-%d))" \
            --assignee jpr5 \
            --body-file "$PR_BODY_FILE"

          PR_URL=""
          for attempt in $(seq 1 6); do
            MATCH="$(gh pr list --state open --json url,headRefOid \
              --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | .url" 2>/dev/null || true)"
            if [ -n "$MATCH" ]; then
              PR_URL="$(printf '%s' "$MATCH" | head -n1)"
              break
            fi
            echo "needs-human PR for head SHA not indexed yet (attempt $attempt/6), waiting 10s..."
            sleep 10
          done
          if [ -z "$PR_URL" ]; then
            echo "::error::No open needs-human PR found whose head matches pushed SHA $HEAD_SHA"
            exit 1
          fi
          echo "Opened needs-human PR: $PR_URL"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      # NO AUTO-MERGE FOR THE DRIFT-SYNC PATH (Phase 0/1 — see
      # drift-auto-adjust-architecture-spec.md §6.1). Through Phase 1 the sync
      # opens a PR and STOPS: a HUMAN reviews CI + the committed diff and
      # merges. Auto-merge is an explicit, invariant-gated exception introduced
      # only later (Phase 4, opt-in) for the single Tier-A2 class (zero-reference
      # deprecation) — out of scope for this change. drift-sync-check is an
      # AUTO-FILTER, NOT a provable merge gate (its clean re-collect is not
      # independent of the edit), so human review remains the merge gate here,
      # unchanged in spirit from the pre-C3 verdict-gated path.

      # Alert: the sync found a genuinely-new family or a still-referenced
      # deprecation — the two irreducible human decisions (see
      # self-healing-drift-plan.md "Bucket B"). The needs-human note was
      # persisted by the step above (a distinct PR was opened, or the note was
      # already in the repo / already proposed in an open PR — no PR spam). This
      # alert fires the job RED so a human sees it. It is SKIPPED when the
      # persist step itself FAILED (steps.needs_human_pr.outcome == 'failure') —
      # that window is a tooling fault handled by the distinct gate-failure alert
      # below, so the two never double-fire.
      - name: Alert on needs-human decision
        if: >-
          always() &&
          steps.sync.outputs.reason == 'needs-human' &&
          steps.needs_human_pr.outcome != 'failure'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          PR_URL: ${{ steps.needs_human_pr.outputs.url }}
        run: |
          set -euo pipefail
          echo "::error::drift-sync found a genuinely-new model family or a still-referenced deprecation — needs a human decision (see the needs-human PR / drift-proposals/*.md)"
          if [ -z "${SLACK_WEBHOOK:-}" ]; then
            echo "::error::SLACK_WEBHOOK not set — cannot send needs-human alert"
            exit 1
          fi
          if [ -n "${PR_URL:-}" ]; then
            WHERE="Review the note in the PR, set \`Decision: include\` (or close to reject), and merge: ${PR_URL}"
          else
            WHERE="The note is already in the repo (already persisted / already proposed in an open PR). See the drift-sync-log artifact and \`drift-proposals/\`."
          fi
          MSG="🧭 *Drift sync — needs a human decision* — a new/unclassified model family or a still-referenced deprecated family was found. ${WHERE}\nRun: https://github.com/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD="$(jq -n --arg text "$MSG" '{text: $text}')"
          curl -fsS --show-error -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          exit 1

      # Alert: covers every failure window once the sync itself has committed
      # a mechanical edit (reason == 'ok-applied'), OR drift-sync's own
      # internal gate reverted the edit before commit (reason ==
      # 'gate-failed'). This is deliberately WIDE — `failure()` in the
      # ok-applied branch, not narrowly `steps.assert.outcome == 'failure'` —
      # because the defense-in-depth Assert step can SUCCEED and a LATER step
      # (Push branch + create PR: rejected push, `gh pr create` error, or the
      # head-SHA PR-match polling loop exhausting its attempts) can still fail
      # the job. With the narrower check, that window left reason ==
      # 'ok-applied' (non-empty, so the early-infra catch-all below stays
      # silent) and steps.assert.outcome == 'success' (so this alert itself
      # stayed silent too) — a silent failure on an unattended daily cron.
      # Either way (gate-failed, assert failure, or a later step failure) this
      # is a genuine tooling fault, NOT a needs-human product decision, so it
      # gets its own distinct alert whose message names the step that failed.
      #
      # G#2: this ALSO covers the needs-human persist step's OWN failure
      # (steps.needs_human_pr.outcome == 'failure' — a rejected push, a
      # `gh pr create` error, or its head-SHA PR-match polling loop exhausting
      # its attempts). That is a tooling fault, not a product decision, so it
      # belongs here rather than in the needs-human alert (which is skipped on a
      # persist failure, so the two never double-fire).
      - name: Alert on drift-sync-check gate failure
        if: >-
          always() &&
          (steps.sync.outputs.reason == 'gate-failed' ||
           (steps.sync.outputs.reason == 'ok-applied' && failure()) ||
           (steps.sync.outputs.reason == 'needs-human' && steps.needs_human_pr.outcome == 'failure'))
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SYNC_REASON: ${{ steps.sync.outputs.reason }}
          ASSERT_OUTCOME: ${{ steps.assert.outcome }}
          PR_OUTCOME: ${{ steps.pr.outcome }}
          NEEDS_HUMAN_PR_OUTCOME: ${{ steps.needs_human_pr.outcome }}
        run: |
          set -euo pipefail
          if [ "${SYNC_REASON}" = "gate-failed" ]; then
            FAILING_STEP="Run deterministic drift sync (drift-sync.ts's own internal drift-sync-check gate reverted the mechanical edit before commit)"
          elif [ "${NEEDS_HUMAN_PR_OUTCOME}" = "failure" ]; then
            FAILING_STEP="Persist needs-human note + open PR (push rejected, gh pr create error, or PR-match polling exhausted — the needs-human note may not have been persisted)"
          elif [ "${ASSERT_OUTCOME}" = "failure" ]; then
            FAILING_STEP="Assert drift-sync-check (defense-in-depth)"
          elif [ "${PR_OUTCOME}" = "failure" ]; then
            FAILING_STEP="Push branch + create PR"
          else
            FAILING_STEP="an unidentified step after the ok-applied sync"
          fi
          echo "::error::drift-sync-check gate failure window — failing step: ${FAILING_STEP} — this is a tooling fault, not a product decision"
          if [ -z "${SLACK_WEBHOOK:-}" ]; then
            echo "::error::SLACK_WEBHOOK not set — cannot send gate-failure alert"
            exit 1
          fi
          MSG="🔒❌ *Drift sync — gate refused* — failing step: ${FAILING_STEP}. This needs engineering triage, not a product decision.\nRun: https://github.com/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD="$(jq -n --arg text "$MSG" '{text: $text}')"
          curl -fsS --show-error -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          exit 1

      # Slack notification on success. Never claims the change auto-merged —
      # see the NO AUTO-MERGE comment above.
      - name: Notify Slack on sync success
        if: success() && steps.pr.outputs.url != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          PR_URL: ${{ steps.pr.outputs.url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK:-}" ]; then
            echo "::error::SLACK_WEBHOOK not set — cannot send sync-success alert"
            exit 0
          fi
          MSG="✅ *Drift-sync PR opened — needs human review + merge*\nA data-only, zero-LLM model-family sync passed drift-sync-check; a human must review CI + the diff and merge.\nPR: ${PR_URL}\nRun: https://github.com/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD="$(jq -n --arg text "$MSG" '{text: $text}')"
          curl -fsS --show-error -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # End-of-job CATCH-ALL for ANY job failure the specific alerts above did
      # NOT cover — chiefly the EARLY-infra window (checkout / mint-app-token /
      # pnpm install / clone ag-ui / git config / ollama provisioning) that runs
      # BEFORE the `sync` step sets its outputs. That window leaves
      # `steps.sync.outputs.reason` empty, so none of the three specific alerts
      # fire and the job would otherwise die red with ZERO Slack signal. This
      # step is UNCONDITIONAL on the earlier step outputs (only `failure()` +
      # the anti-double-alert guard below), so it fires whenever nothing else
      # did.
      - name: Alert on early-infra failure (catch-all)
        if: failure() && steps.sync.outputs.reason == ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK:-}" ]; then
            echo "::error::Drift-sync job failed during INFRA/SETUP (before drift-sync ran) AND SLACK_WEBHOOK is not set — no alert could be sent. See run https://github.com/${REPO}/actions/runs/${RUN_ID}"
            exit 1
          fi
          MSG="🧱❌ *Drift-sync job — INFRA/SETUP failure* — the job failed during setup (checkout / token mint / pnpm install / ag-ui clone / git config / ollama provisioning) BEFORE drift-sync ran; this is not a sync-gate failure. Manual intervention needed.\nRun: https://github.com/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD="$(jq -n --arg text "$MSG" '{text: $text}')"
          curl -fsS --show-error -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
